<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentOS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230d1117'/><text x='16' y='23' text-anchor='middle' font-size='20' fill='%2358a6ff'>A</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;--dim:#484f58;
--blue:#58a6ff;--green:#3fb950;--yellow:#d29922;--red:#f85149;--purple:#a371f7;--teal:#00cec9}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;color:var(--blue);font-weight:700;letter-spacing:-.3px}
.header h1 span{color:var(--muted);font-weight:400}
.controls{display:flex;gap:12px;align-items:center}
.live-dot{width:7px;height:7px;background:var(--green);border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.live-label{font-size:11px;color:var(--green);font-weight:600;letter-spacing:.5px}
.last-updated{font-size:10px;color:var(--dim);font-family:monospace}
select{background:#21262d;color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:6px;font-size:12px;cursor:pointer}
.status-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.5px}
.status-ok{background:#3fb95022;color:var(--green)}
.status-idle{background:#21262d;color:var(--dim)}
.status-warn{background:#d2992222;color:var(--yellow)}
.status-alert{background:#f8514933;color:var(--red);animation:pulse 1.5s infinite}

/* Alert Bar */
.alert-bar{padding:6px 24px;display:flex;gap:8px;overflow-x:auto;align-items:center}
.alert-bar:empty{display:none}
.alert-item{font-size:11px;padding:4px 10px;border-radius:4px;white-space:nowrap;display:flex;align-items:center;gap:5px}
.alert-error{background:#f8514922;color:var(--red);border:1px solid #f8514944}
.alert-warning{background:#d2992222;color:var(--yellow);border:1px solid #d2992244}
.alert-info{background:#58a6ff22;color:var(--blue);border:1px solid #58a6ff44}

/* Layout */
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 24px}
.grid-3-1{display:grid;grid-template-columns:1fr 300px;gap:16px;padding:0 24px 16px}
.section{padding:0 24px 16px}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px}
.card h3{font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;letter-spacing:.6px;font-weight:600}
.gauge-val{font-size:28px;font-weight:700;line-height:1.1}
.gauge-sub{font-size:11px;color:var(--muted);margin-top:2px}
.gauge-bar{height:5px;background:#21262d;border-radius:3px;margin-top:8px;overflow:hidden}
.gauge-fill{height:100%;border-radius:3px;transition:width .6s ease}
.c-green{color:var(--green)}.c-green .gauge-fill{background:var(--green)}
.c-yellow{color:var(--yellow)}.c-yellow .gauge-fill{background:var(--yellow)}
.c-red{color:var(--red)}.c-red .gauge-fill{background:var(--red)}
.c-blue{color:var(--blue)}

/* Pane Grid */
.pane-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pane-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:border-color .2s,transform .1s}
.pane-card:hover{border-color:var(--blue);transform:translateY(-1px)}
.pane-card.active{border-left:3px solid}
.pane-card.idle{opacity:.45;padding:8px 12px}
.pane-card.has-error{border-color:var(--red);box-shadow:0 0 8px #f8514933}
.pane-card.is-done{border-color:var(--green);box-shadow:0 0 8px #3fb95033}
.pane-card.is-stuck{border-color:var(--yellow);box-shadow:0 0 8px #d2992233}
.pane-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pane-num{font-size:11px;font-weight:700;padding:1px 5px;border-radius:3px;color:#000}
.pane-status{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.pane-status.s-active{color:var(--green)}
.pane-status.s-idle{color:var(--dim)}
.pane-status.s-done{color:var(--blue)}
.pane-status.s-error{color:var(--red)}
.pane-status.s-stuck{color:var(--yellow)}
.pane-project{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pane-task{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.pane-meta{display:flex;gap:6px;margin-top:6px;align-items:center;flex-wrap:wrap}
.badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.3px}
.badge-role{background:#1f6feb22;color:var(--blue)}
.badge-pty{background:#3fb95022;color:var(--green)}
.badge-lines{background:#21262d;color:var(--muted)}
.badge-runtime{background:#a371f722;color:var(--purple)}
.badge-phase{background:#00cec922;color:var(--teal)}
.badge-errors{background:#f8514922;color:var(--red)}
.badge-done{background:#3fb95022;color:var(--green)}

/* Sidebar */
.sidebar{display:flex;flex-direction:column;gap:12px}
.log-list{max-height:300px;overflow-y:auto}
.log-entry{font-size:11px;padding:5px 0;border-bottom:1px solid #21262d;display:flex;gap:8px}
.log-entry:last-child{border-bottom:none}
.log-ts{color:var(--dim);font-family:monospace;flex-shrink:0}
.log-pane{color:var(--blue);font-weight:600;flex-shrink:0}
.log-msg{color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Role bars */
.role-bar{margin-bottom:8px}
.role-bar:last-child{margin-bottom:0}
.role-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.role-track{height:6px;background:#21262d;border-radius:3px;overflow:hidden}
.role-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .5s}

/* Kanban */
.kanban{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.kanban-col{min-width:170px;flex:1}
.kanban-col h4{font-size:11px;text-transform:uppercase;color:var(--muted);padding:6px 8px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:6px 6px 0 0;letter-spacing:.4px}
.kanban-cards{background:var(--bg);border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;padding:6px;min-height:60px}
.k-card{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:8px;margin-bottom:6px;font-size:11px}
.k-card:last-child{margin-bottom:0}
.k-id{color:var(--dim);font-size:10px;font-family:monospace}
.k-title{font-weight:500;margin:2px 0}
.k-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.tag{padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.2px}
.tag-critical{background:#f8514922;color:var(--red)}
.tag-high{background:#d2992222;color:var(--yellow)}
.tag-medium{background:#58a6ff22;color:var(--blue)}
.tag-low{background:#3fb95022;color:var(--green)}
.tag-acu{background:#a371f722;color:var(--purple)}
.tag-role{background:#1f6feb22;color:var(--blue)}

/* Output modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:10px;width:90%;max-width:900px;max-height:85vh;display:flex;flex-direction:column}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
.modal-header h2{font-size:14px;display:flex;align-items:center;gap:8px}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:2px 8px;border-radius:4px}
.modal-close:hover{background:#21262d;color:var(--text)}
.modal-body{flex:1;overflow-y:auto;padding:14px 18px}
.terminal{background:#0d1117;border:1px solid var(--border);border-radius:6px;padding:12px;font-family:'SF Mono',Monaco,'Cascadia Code',monospace;font-size:12px;line-height:1.5;white-space:pre-wrap;word-break:break-all;color:#e6edf3;max-height:400px;overflow-y:auto}
.modal-meta{display:flex;gap:16px;margin-bottom:12px;font-size:12px;flex-wrap:wrap}
.modal-meta dt{color:var(--muted);font-size:10px;text-transform:uppercase}
.modal-meta dd{font-weight:600}
.modal-errors{margin-bottom:12px}
.modal-errors h4{font-size:11px;color:var(--red);margin-bottom:4px}
.error-line{font-size:11px;font-family:monospace;padding:3px 6px;margin-bottom:2px;background:#f8514911;border-radius:3px;color:var(--red)}
.warning-line{font-size:11px;font-family:monospace;padding:3px 6px;margin-bottom:2px;background:#d2992211;border-radius:3px;color:var(--yellow)}

/* Sprint */
.sprint-info{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.sprint-name{font-size:14px;font-weight:700;color:var(--blue)}
.sprint-stat{text-align:center}
.sprint-stat .val{font-size:20px;font-weight:700}
.sprint-stat .label{font-size:10px;color:var(--muted);text-transform:uppercase}

.no-data{color:var(--dim);font-size:12px;text-align:center;padding:24px}
.section-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px}

/* Burndown */
.burndown-wrap{position:relative}
canvas{width:100%;display:block}

/* Queue table */
.q-table{width:100%;border-collapse:collapse;font-size:12px}
.q-table th{text-align:left;font-size:10px;text-transform:uppercase;color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--border);letter-spacing:.4px;font-weight:600}
.q-table td{padding:6px 8px;border-bottom:1px solid #21262d}
.q-table tr:hover{background:#21262d}
.q-id{font-family:monospace;color:var(--dim);font-size:10px}
.q-status{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:1px 6px;border-radius:3px}
.q-pending{background:#d2992222;color:var(--yellow)}
.q-running{background:#3fb95022;color:var(--green)}
.q-done{background:#58a6ff22;color:var(--blue)}
.q-failed{background:#f8514922;color:var(--red)}
.q-blocked{background:#a371f722;color:var(--purple)}
.q-priority{font-size:10px;font-weight:700;display:inline-block;width:16px;height:16px;line-height:16px;text-align:center;border-radius:50%}
.q-p1{background:var(--red);color:#000}.q-p2{background:var(--yellow);color:#000}.q-p3{background:var(--blue);color:#000}
.q-p4{background:var(--dim);color:var(--text)}.q-p5{background:#21262d;color:var(--muted)}
.q-empty{text-align:center;padding:20px;color:var(--dim);font-size:12px}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--dim)}
</style>
</head>
<body>

<div class="header">
  <h1>AgentOS <span>Runtime</span></h1>
  <div class="controls">
    <span id="status-indicator" class="status-badge status-idle">IDLE</span>
    <span class="live-dot"></span>
    <span class="live-label">LIVE</span>
    <span class="last-updated" id="last-updated"></span>
    <select id="space-select" onchange="refresh()"></select>
  </div>
</div>

<div class="alert-bar" id="alerts"></div>

<div class="grid-4" id="gauges"></div>

<div class="grid-3-1">
  <div>
    <div class="section-title">Agent Panes</div>
    <div class="pane-grid" id="panes"></div>
  </div>
  <div class="sidebar">
    <div class="card" id="roles-card">
      <h3>Role Utilization</h3>
      <div id="roles"></div>
    </div>
    <div class="card">
      <h3>Activity Log</h3>
      <div class="log-list" id="logs"></div>
    </div>
  </div>
</div>

<div class="section" id="queue-section">
  <div class="section-title" style="display:flex;align-items:center;gap:12px">
    Task Queue <span id="queue-summary" style="font-weight:400;color:var(--muted);font-size:11px"></span>
    <button onclick="toggleAddForm()" style="background:var(--green);color:#000;border:none;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;cursor:pointer">+ Add</button>
  </div>
  <div id="queue-add-form" style="display:none;margin-bottom:12px">
    <div class="card" style="display:flex;gap:8px;flex-wrap:wrap;align-items:end">
      <div><label style="font-size:10px;color:var(--muted);display:block">Project</label><input id="qa-project" style="background:#21262d;color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:12px;width:140px" placeholder="project-name"></div>
      <div><label style="font-size:10px;color:var(--muted);display:block">Task</label><input id="qa-task" style="background:#21262d;color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:12px;width:200px" placeholder="Task description"></div>
      <div><label style="font-size:10px;color:var(--muted);display:block">Role</label><select id="qa-role" style="background:#21262d;color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:12px"><option>developer</option><option>frontend</option><option>backend</option><option>qa</option><option>devops</option><option>pm</option></select></div>
      <div><label style="font-size:10px;color:var(--muted);display:block">Priority</label><select id="qa-priority" style="background:#21262d;color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-size:12px"><option value="1">1 Critical</option><option value="2">2 High</option><option value="3" selected>3 Normal</option><option value="4">4 Low</option><option value="5">5 Nice-to-have</option></select></div>
      <button onclick="submitTask()" style="background:var(--blue);color:#fff;border:none;padding:5px 16px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer">Queue</button>
    </div>
  </div>
  <div id="queue-table"></div>
</div>

<div class="section" id="sprint-section"></div>

<div class="section">
  <div class="section-title">Board</div>
  <div class="kanban" id="kanban"></div>
</div>

<div class="section burndown-wrap" id="burndown-section" style="display:none">
  <div class="card">
    <h3>Sprint Burndown</h3>
    <canvas id="burndown-chart" width="700" height="160"></canvas>
  </div>
</div>

<!-- Pane output modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Pane Output</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta" id="modal-meta"></div>
      <div class="modal-errors" id="modal-errors"></div>
      <div class="terminal" id="modal-output"></div>
    </div>
  </div>
</div>

<script>
const API='';
let currentSpace='';
let pollTimer=null;
let monitorData=null;

async function fetchJSON(url){
  try{const r=await fetch(API+url);if(!r.ok)return null;return await r.json();}catch(e){return null;}
}

function gc(pct){return pct>80?'c-red':pct>50?'c-yellow':'c-green'}
function fmtMins(m){if(!m&&m!==0)return'';if(m<60)return m+'m';return Math.floor(m/60)+'h'+(m%60?m%60+'m':'');}

function updateTimestamp(){
  const now=new Date();
  const h=String(now.getHours()).padStart(2,'0');
  const m=String(now.getMinutes()).padStart(2,'0');
  const s=String(now.getSeconds()).padStart(2,'0');
  document.getElementById('last-updated').textContent=h+':'+m+':'+s;
}

// === Monitor (single-call data source) ===
async function loadMonitor(){
  monitorData=await fetchJSON('/api/monitor');
  if(!monitorData)return;

  // Update status indicator — IDLE when nothing running, ALL CLEAR when agents active and healthy
  const ind=document.getElementById('status-indicator');
  const s=monitorData.status;
  const active=monitorData.summary?monitorData.summary.active:0;
  const hasAlerts=monitorData.alerts&&monitorData.alerts.length>0;

  if(s==='ATTENTION NEEDED'){
    ind.textContent='ATTENTION NEEDED';
    ind.className='status-badge status-alert';
  } else if(active>0&&!hasAlerts){
    ind.textContent='ALL CLEAR';
    ind.className='status-badge status-ok';
  } else if(active>0){
    ind.textContent='OK';
    ind.className='status-badge status-warn';
  } else {
    ind.textContent='IDLE';
    ind.className='status-badge status-idle';
  }

  // Render alerts
  const alertEl=document.getElementById('alerts');
  if(monitorData.alerts&&monitorData.alerts.length){
    alertEl.innerHTML=monitorData.alerts.map(a=>{
      const cls=a.level==='error'?'alert-error':a.level==='warning'?'alert-warning':'alert-info';
      const icon=a.level==='error'?'&#x26D4;':a.level==='warning'?'&#x26A0;':'&#x2139;';
      return `<div class="alert-item ${cls}">${icon} P${a.pane} ${a.theme}: ${a.message}</div>`;
    }).join('');
  }else{
    alertEl.innerHTML='';
  }

  updateTimestamp();
}

// === Spaces ===
async function loadSpaces(){
  const sel=document.getElementById('space-select');
  const spaces=await fetchJSON('/api/spaces');
  if(!spaces||!spaces.length){sel.innerHTML='<option>No spaces</option>';return;}
  sel.innerHTML=spaces.map(s=>`<option value="${s}">${s}</option>`).join('');
  currentSpace=spaces[0];sel.value=currentSpace;
}

// === Gauges ===
async function renderGauges(){
  const d=await fetchJSON(`/api/capacity/dashboard?space=${currentSpace}`);
  if(!d)return;
  const sm=monitorData?monitorData.summary:{active:0};
  const q=monitorData?monitorData.queue:{pending:0,running:0};
  const acuC=gc(d.acu_pct);const revC=gc(d.reviews_pct);
  const total=sm.total||9;
  document.getElementById('gauges').innerHTML=`
    <div class="card ${acuC}"><h3>ACU Today</h3><div class="gauge-val">${d.acu_used}</div>
      <div class="gauge-sub">of ${d.acu_total} capacity</div>
      <div class="gauge-bar"><div class="gauge-fill" style="width:${Math.min(d.acu_pct,100)}%"></div></div></div>
    <div class="card ${revC}"><h3>Reviews</h3><div class="gauge-val">${d.reviews_used}</div>
      <div class="gauge-sub">of ${d.reviews_total} bandwidth</div>
      <div class="gauge-bar"><div class="gauge-fill" style="width:${Math.min(d.reviews_pct,100)}%"></div></div></div>
    <div class="card c-blue"><h3>Agents</h3><div class="gauge-val">${sm.active||0}<span style="font-size:14px;color:var(--muted)"> / ${total}</span></div>
      <div class="gauge-sub">${sm.errors?'<span style="color:var(--red)">'+sm.errors+' errors</span> &middot; ':''} ${sm.stuck?'<span style="color:var(--yellow)">'+sm.stuck+' stuck</span> &middot; ':''} ${sm.done||0} done</div>
      <div class="gauge-bar"><div class="gauge-fill" style="width:${(sm.active||0)/total*100}%;background:var(--blue)"></div></div></div>
    <div class="card ${q.pending>5?'c-yellow':'c-green'}"><h3>Queue</h3><div class="gauge-val">${q.pending||0}<span style="font-size:14px;color:var(--muted)"> pending</span></div>
      <div class="gauge-sub">${q.running||0} running &middot; ${q.done||0} done${q.failed?' &middot; <span style=color:var(--red)>'+q.failed+' failed</span>':''}</div>
      <div class="gauge-bar"><div class="gauge-fill" style="width:${Math.min((q.running||0)/Math.max(total,1)*100,100)}%;background:var(--green)"></div></div></div>`;
}

// === Pane Grid (uses monitor data) ===
function renderPanesFromMonitor(){
  if(!monitorData||!monitorData.panes)return;
  const el=document.getElementById('panes');
  let html='';
  for(const p of monitorData.panes){
    const h=p.health;
    const isIdle=h==='idle';
    const isActive=h==='active'||h==='done'||h==='error'||h==='stuck';
    const hasProject=p.project&&p.project!=='--';
    let cls=isActive?'active':'idle';
    if(h==='error')cls+=' has-error';
    else if(h==='done')cls+=' is-done';
    else if(h==='stuck')cls+=' is-stuck';
    const sc=h==='active'?'s-active':h==='done'?'s-done':h==='error'?'s-error':h==='stuck'?'s-stuck':'s-idle';
    const color=p.theme_color||getThemeColor(p.pane);

    if(isIdle&&!hasProject){
      // Compact idle pane — no stale data
      html+=`<div class="pane-card idle" style="border-left-color:${color}" onclick="openPaneWatch(${p.pane})">
        <div class="pane-top" style="margin-bottom:0">
          <span class="pane-num" style="background:${color}">${p.pane}</span>
          <span class="pane-status s-idle">available</span>
        </div>
      </div>`;
    } else {
      // Active or has-data pane
      html+=`<div class="pane-card ${cls}" style="border-left-color:${color}" onclick="openPaneWatch(${p.pane})">
        <div class="pane-top">
          <span class="pane-num" style="background:${color}">${p.pane}</span>
          <span class="pane-status ${sc}">${h}</span>
        </div>
        <div class="pane-project">${p.project||'--'}</div>
        <div class="pane-task">${p.task||'No task assigned'}</div>
        <div class="pane-meta">
          ${p.role&&p.role!=='--'?`<span class="badge badge-role">${p.role}</span>`:''}
          ${p.pty?'<span class="badge badge-pty">PTY</span>':''}
          ${p.lines>0?`<span class="badge badge-lines">${p.lines}L</span>`:''}
          ${p.runtime_mins?`<span class="badge badge-runtime">${fmtMins(p.runtime_mins)}</span>`:''}
          ${p.error?'<span class="badge badge-errors">ERR</span>':''}
          ${h==='done'?'<span class="badge badge-done">DONE</span>':''}
        </div>
      </div>`;
    }
  }
  el.innerHTML=html;
}

const THEME_COLORS=['#00d4ff','#00ff41','#bf00ff','#ff9500','#ff3366','#ffcc00','#c0c0c0','#00cec9','#fd79a8'];
function getThemeColor(n){return THEME_COLORS[(n-1)%THEME_COLORS.length]}

// === Pane Watch Modal ===
async function openPaneWatch(paneNum){
  const d=await fetchJSON(`/api/pane/${paneNum}/watch?lines=80`);
  if(!d)return;
  const color=d.theme_color||getThemeColor(paneNum);
  document.getElementById('modal-title').innerHTML=
    `<span class="pane-num" style="background:${color}">${d.pane}</span> ${d.theme} &mdash; ${d.project&&d.project!=='--'?d.project:'idle'}`;
  document.getElementById('modal-meta').innerHTML=`
    <div><dt>Role</dt><dd>${d.role&&d.role!=='--'?d.role:'--'}</dd></div>
    <div><dt>Status</dt><dd>${d.status||'idle'}</dd></div>
    <div><dt>Phase</dt><dd>${d.phase||'--'}</dd></div>
    <div><dt>PTY</dt><dd>${d.pty_running?'Running':'Off'}</dd></div>
    <div><dt>Lines</dt><dd>${d.line_count}</dd></div>
    <div><dt>Runtime</dt><dd>${fmtMins(d.runtime_mins)||'--'}</dd></div>
    <div><dt>Branch</dt><dd>${d.branch||'--'}</dd></div>
    ${d.done?'<div><dt>Done</dt><dd style="color:var(--green)">YES</dd></div>':''}`;

  // Errors section
  const errEl=document.getElementById('modal-errors');
  let errHtml='';
  if(d.errors&&d.errors.length){
    errHtml+=`<h4>Errors (${d.error_count})</h4>`;
    for(const e of d.errors.slice(0,10)){
      errHtml+=`<div class="error-line">L${e.line}: ${e.text}</div>`;
    }
  }
  if(d.warnings&&d.warnings.length){
    errHtml+=`<h4 style="color:var(--yellow);margin-top:6px">Warnings (${d.warning_count})</h4>`;
    for(const w of d.warnings.slice(0,5)){
      errHtml+=`<div class="warning-line">L${w.line}: ${w.text}</div>`;
    }
  }
  errEl.innerHTML=errHtml;

  const out=d.output||'[No output yet]';
  const termEl=document.getElementById('modal-output');
  termEl.textContent=out;
  document.getElementById('modal').classList.add('open');
  termEl.scrollTop=termEl.scrollHeight;

  // Auto-refresh modal with watch endpoint
  if(pollTimer)clearInterval(pollTimer);
  pollTimer=setInterval(async()=>{
    const u=await fetchJSON(`/api/pane/${paneNum}/watch?lines=80`);
    if(u&&u.output){
      termEl.textContent=u.output;
      termEl.scrollTop=termEl.scrollHeight;
    }
  },3000);
}
function closeModal(){
  document.getElementById('modal').classList.remove('open');
  if(pollTimer){clearInterval(pollTimer);pollTimer=null;}
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// === Roles ===
async function renderRoles(){
  const d=await fetchJSON(`/api/capacity/dashboard?space=${currentSpace}`);
  if(!d||!d.roles)return;
  const el=document.getElementById('roles');
  const entries=Object.entries(d.roles);
  const anyActive=entries.some(([,v])=>v.pct>0);
  if(!anyActive){
    el.innerHTML='<div class="no-data" style="padding:12px">No active agents</div>';
    return;
  }
  let html='';
  for(const[k,v]of entries){
    html+=`<div class="role-bar"><div class="role-label"><span>${v.name}</span><span>${v.pct}%</span></div>
      <div class="role-track"><div class="role-fill" style="width:${v.pct}%"></div></div></div>`;
  }
  el.innerHTML=html;
}

// === Logs (uses monitor data + full log) ===
function renderLogsFromMonitor(){
  const el=document.getElementById('logs');
  // Fetch full log for sidebar
  fetchJSON('/api/logs').then(logs=>{
    if(!logs||!logs.length){el.innerHTML='<div class="no-data">No activity yet</div>';return;}
    let html='';
    for(const l of logs.slice(0,20)){
      const ts=l.ts&&l.ts.length>=16?l.ts.slice(11,16):l.ts||'';
      const fullMsg=l.summary||l.event||'';
      html+=`<div class="log-entry" title="${fullMsg.replace(/"/g,'&quot;')}"><span class="log-ts">${ts}</span><span class="log-pane">P${l.pane}</span><span class="log-msg">${fullMsg}</span></div>`;
    }
    el.innerHTML=html;
  });
}

// === Queue Form ===
function toggleAddForm(){document.getElementById('queue-add-form').style.display=document.getElementById('queue-add-form').style.display==='none'?'block':'none';}
async function submitTask(){
  const project=document.getElementById('qa-project').value.trim();
  const task=document.getElementById('qa-task').value.trim();
  const role=document.getElementById('qa-role').value;
  const priority=parseInt(document.getElementById('qa-priority').value);
  if(!project||!task)return alert('Project and task are required');
  const r=await fetch('/api/queue/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({project,task,role,priority})});
  const d=await r.json();
  if(d.error){alert(d.error);return;}
  document.getElementById('qa-task').value='';
  await renderQueue();
}

async function deleteTask(id){
  await fetch('/api/queue/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:id})});
  await renderQueue();
}
async function retryTask(id){
  await fetch('/api/queue/retry',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({task_id:id})});
  await renderQueue();
}

// === Queue ===
async function renderQueue(){
  const d=await fetchJSON('/api/queue');
  if(!d)return;
  const sumEl=document.getElementById('queue-summary');
  const s=d.summary;
  sumEl.textContent=`${s.pending} pending \u00b7 ${s.running} running \u00b7 ${s.done} done${s.failed?' \u00b7 '+s.failed+' failed':''}`;
  const el=document.getElementById('queue-table');
  const active=d.tasks.filter(t=>t.status!=='done');
  const failed=d.tasks.filter(t=>t.status==='failed');
  const done=d.tasks.filter(t=>t.status==='done').slice(-3).reverse();
  const show=[...active,...done];
  if(!show.length){el.innerHTML='<div class="q-empty">Queue empty &mdash; use + Add or MCP os_queue_add</div>';return;}
  let html='<table class="q-table"><thead><tr><th>ID</th><th>P</th><th>Status</th><th>Project</th><th>Task</th><th>Role</th><th>Pane</th><th></th></tr></thead><tbody>';
  for(const t of show){
    const sc=t.status==='pending'?'q-pending':t.status==='running'?'q-running':t.status==='done'?'q-done':t.status==='failed'?'q-failed':'q-blocked';
    const pc='q-p'+(t.priority||3);
    const pane=t.pane?'P'+t.pane:'\u2014';
    const proj=(t.project||'').split('/').pop();
    const fullTask=t.task||'';
    let actions='';
    if(t.status==='failed'||t.status==='done')actions+=`<button onclick="retryTask('${t.id}')" style="background:var(--yellow);color:#000;border:none;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer;margin-right:3px">RETRY</button>`;
    if(t.status!=='running')actions+=`<button onclick="deleteTask('${t.id}')" style="background:var(--red);color:#fff;border:none;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;cursor:pointer">DEL</button>`;
    html+=`<tr><td class="q-id">${t.id}</td><td><span class="q-priority ${pc}">${t.priority}</span></td>
      <td><span class="q-status ${sc}">${t.status}</span></td>
      <td>${proj}</td><td title="${fullTask.replace(/"/g,'&quot;')}">${fullTask.slice(0,40)}${fullTask.length>40?'...':''}</td><td><span class="badge badge-role">${t.role||'dev'}</span></td>
      <td>${pane}</td><td>${actions}</td></tr>`;
  }
  html+='</tbody></table>';
  el.innerHTML=html;
}

// === Board ===
async function renderBoard(){
  const d=await fetchJSON(`/api/board?space=${currentSpace}`);
  const order=['backlog','todo','in_progress','review','done'];
  const labels={backlog:'Backlog',todo:'To Do',in_progress:'In Progress',review:'Review',done:'Done'};
  // Check if board has any data
  const totalCards=d?order.reduce((sum,col)=>(d[col]?sum+d[col].length:sum),0):0;
  if(!d||totalCards===0){
    document.getElementById('kanban').innerHTML='<div class="no-data" style="width:100%">No issues tracked &mdash; create issues via MCP issue_create</div>';
    return;
  }
  let html='';
  for(const col of order){
    const cards=d[col]||[];
    html+=`<div class="kanban-col"><h4>${labels[col]} (${cards.length})</h4><div class="kanban-cards">`;
    for(const c of cards){
      const acu=c.estimated_acu?`<span class="tag tag-acu">${c.estimated_acu} ACU</span>`:'';
      const role=c.role?`<span class="tag tag-role">${c.role.toUpperCase()}</span>`:'';
      html+=`<div class="k-card"><div class="k-id">${c.id}</div><div class="k-title">${(c.title||'').slice(0,50)}</div>
        <div class="k-tags"><span class="tag tag-${c.priority}">${(c.priority||'').toUpperCase()}</span>${acu}${role}</div></div>`;
    }
    if(!cards.length)html+='<div class="no-data" style="padding:12px">Empty</div>';
    html+='</div></div>';
  }
  document.getElementById('kanban').innerHTML=html;
}

// === Sprint ===
async function renderSprint(){
  const sprints=await fetchJSON(`/api/sprints?space=${currentSpace}`);
  const el=document.getElementById('sprint-section');
  const bdEl=document.getElementById('burndown-section');
  if(!sprints||!sprints.length){el.innerHTML='';bdEl.style.display='none';return;}
  const active=sprints.find(s=>s.status==='active')||sprints[sprints.length-1];
  const planned=active.planned||{};
  el.innerHTML=`<div class="card"><div class="sprint-info">
    <div class="sprint-name">${active.name||active.id}</div>
    <div class="sprint-stat"><div class="val">${planned.total_acu||0}</div><div class="label">Planned ACU</div></div>
    <div class="sprint-stat"><div class="val">${planned.total_reviews||0}</div><div class="label">Reviews</div></div>
    <div class="sprint-stat"><div class="val">${(planned.issues||[]).length}</div><div class="label">Issues</div></div>
  </div></div>`;

  const bd=await fetchJSON(`/api/burndown?sprint=${active.id}`);
  if(bd&&bd.ideal&&bd.ideal.length){bdEl.style.display='block';drawBurndown(bd);}
  else{bdEl.style.display='none';}
}

function drawBurndown(bd){
  const canvas=document.getElementById('burndown-chart');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  canvas.width=canvas.offsetWidth*dpr;canvas.height=160*dpr;
  ctx.scale(dpr,dpr);
  const W=canvas.offsetWidth,H=160;
  ctx.clearRect(0,0,W,H);
  const max=bd.planned_acu||1;const days=bd.ideal.length;
  const pad={l:40,r:10,t:15,b:25};
  const xS=(W-pad.l-pad.r)/Math.max(days-1,1);

  ctx.strokeStyle='#21262d';ctx.lineWidth=1;
  for(let i=0;i<5;i++){const y=pad.t+i*(H-pad.t-pad.b)/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();}
  ctx.fillStyle='#484f58';ctx.font='10px sans-serif';ctx.textAlign='right';
  for(let i=0;i<5;i++){const v=max-i*max/4;ctx.fillText(v.toFixed(0),pad.l-5,pad.t+4+i*(H-pad.t-pad.b)/4);}
  ctx.textAlign='center';
  for(let i=0;i<days;i+=Math.max(1,Math.floor(days/6))){
    ctx.fillText(bd.ideal[i].date.slice(5),pad.l+i*xS,H-5);
  }

  ctx.strokeStyle='#30363d';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.beginPath();
  for(let i=0;i<days;i++){const x=pad.l+i*xS,y=pad.t+(1-bd.ideal[i].remaining/max)*(H-pad.t-pad.b);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
  ctx.stroke();ctx.setLineDash([]);

  if(bd.actual&&bd.actual.length){
    ctx.strokeStyle='#58a6ff';ctx.lineWidth=2;ctx.beginPath();
    for(let i=0;i<bd.actual.length;i++){const x=pad.l+i*xS,y=pad.t+(1-bd.actual[i].remaining/max)*(H-pad.t-pad.b);i?ctx.lineTo(x,y):ctx.moveTo(x,y);}
    ctx.stroke();
    ctx.fillStyle='#58a6ff';
    for(let i=0;i<bd.actual.length;i++){const x=pad.l+i*xS,y=pad.t+(1-bd.actual[i].remaining/max)*(H-pad.t-pad.b);ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();}
  }
}

// === SSE ===
function connectSSE(){
  const es=new EventSource('/api/events');
  es.onmessage=(e)=>{
    try{const d=JSON.parse(e.data);if(d.type==='queue_changed')renderQueue();else refresh();}
    catch(_){refresh();}
  };
  es.onerror=()=>{setTimeout(connectSSE,5000);es.close();};
}

// === Refresh ===
async function refresh(){
  currentSpace=document.getElementById('space-select').value;
  await loadMonitor();
  renderPanesFromMonitor();
  renderLogsFromMonitor();
  await Promise.all([renderGauges(),renderRoles(),renderQueue(),renderBoard(),renderSprint()]);
}

async function init(){
  await loadSpaces();
  await refresh();
  connectSSE();
  setInterval(refresh,8000);
}
init();
</script>
